name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Unit Tests
            command: pnpm run test:unit
          - name: Type Check
            command: pnpm run test:type
          - name: Lint & Format
            command: pnpm run test:format
          - name: Build
            command: pnpm run build
          - name: Docs Build
            command: pnpm run --if-present --filter @skybridge/docs build
          - name: Docs Lint
            command: pnpm run --if-present --filter @skybridge/docs lint
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install workspace devtools package in core
        run: pnpm add "@skybridge/devtools@workspace:0.0.0" --filter skybridge

      - name: Build devtools
        run: pnpm --filter @skybridge/devtools build

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  create-skybridge-template:
    name: create-skybridge template
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install template dependencies with workspace package versions
        run: | 
          pnpm add "skybridge@workspace:0.0.0" "@skybridge/devtools@workspace:0.0.0" --filter apps-sdk-template
          pnpm add "@skybridge/devtools@workspace:0.0.0" --filter skybridge

      - name: Build devtools
        run: pnpm --filter @skybridge/devtools build

      - name: Build core
        run: pnpm --filter skybridge build

      - name: Build template
        run: pnpm --filter apps-sdk-template run build

  windows:
    name: Windows build
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install workspace devtools package in core
        run: pnpm add "@skybridge/devtools@workspace:0.0.0" --filter skybridge

      - name: Build devtools
        run: pnpm --filter @skybridge/devtools build

      - name: Build
        run: pnpm run build

  draft-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
