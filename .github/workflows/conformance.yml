name: Hooks Conformance

on:
  #schedule:
  #  - cron: "0 */6 * * *"
  workflow_dispatch:
  #release:
  #  types: [published]

permissions:
  contents: read

jobs:
  conformance:
    name: ${{ matrix.host }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        host: [chatgpt, claude]
    outputs:
      mismatches: ${{ steps.results.outputs.mismatches }}
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v6

      # The driver connects to a Notte cloud browser over CDP (--mode notte),
      # so no local browser is launched; uv resolves the script's inline deps.
      - name: Run conformance on ${{ matrix.host }}
        working-directory: examples/conformance
        run: |
          uv run notte/conformance.py \
            --host ${{ matrix.host }} \
            --mode notte \
            --profile-id ${{ vars.NOTTE_PROFILE_ID }} \
            --out conformance-results
        env:
          NOTTE_API_KEY: ${{ secrets.NOTTE_API_KEY }}

      - name: Collect results for notifications
        id: results
        if: always()
        working-directory: examples/conformance
        run: |
          FILE=conformance-results/results.json
          if [ -f "$FILE" ]; then
            MISMATCHES=$(jq -r '.mismatches[]?' "$FILE" | head -10 | sed 's/^/• /')
          fi
          [ -z "${MISMATCHES:-}" ] && MISMATCHES="(no results produced — see the job logs)"
          {
            echo "mismatches<<RESULTS_EOF"
            echo "$MISMATCHES"
            echo "RESULTS_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ matrix.host }}-conformance-results
          path: examples/conformance/conformance-results/

  notify-slack:
    needs: [conformance]
    if: always() && (needs.conformance.result == 'failure' || needs.conformance.result == 'timed_out')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_USERNAME: GitHub Actions
          SLACK_TITLE: ❌ Hooks conformance failed
          SLACK_COLOR: failure
          SLACK_MESSAGE_ON_FAILURE: |
            The scheduled hooks conformance run failed (${{ needs.conformance.result }}).

            Baseline mismatches:
            ${{ needs.conformance.outputs.mismatches }}

            Full results (json + screenshot) are in the per-host conformance-results artifacts.
          MSG_MINIMAL: actions url
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
