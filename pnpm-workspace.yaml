packages:
  - "docs"
  - "infrastructure"
  - "landing"
  - "packages/*"
  - "packages/create-skybridge/templates/demo"
  - "packages/create-skybridge/templates/blank"
  - "examples/*"

# Delay installing newly published versions by 3 days to reduce exposure to
# supply-chain attacks via compromised releases.
minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  # Our own packages are trusted, install them as soon as they're published.
  - "@skybridge/devtools"

allowBuilds:
  esbuild: true

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
