packages:
  - "docs"
  - "infrastructure"
  - "landing"
  - "packages/*"
  - "packages/create-skybridge/templates/demo"
  - "packages/create-skybridge/templates/blank"
  - "examples/*"

# Delay installing newly published versions by 2 weeks to reduce exposure to
# supply-chain attacks via compromised releases.
minimumReleaseAge: 20160

# Exempt our own published packages from the cooldown — we publish them, so the
# supply-chain delay adds no protection and would block installing fresh releases.
minimumReleaseAgeExclude:
  - skybridge
  - alpic
  - "@skybridge/*"
  - "@alpic-ai/*"

allowBuilds:
  esbuild: true

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
