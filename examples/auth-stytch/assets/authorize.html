<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
      .center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
      .card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 2rem; max-width: 420px; width: 100%; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
      h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.75rem; }
      p.subtext { color: #6b7280; margin-bottom: 1.25rem; line-height: 1.5; }
      ul { list-style: none; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; color: #374151; }
      .button-row { display: flex; gap: 0.75rem; }
      .allow-btn { flex: 1; padding: 0.75rem; background: #111827; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; }
      .deny-btn { flex: 1; padding: 0.75rem; background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; }
      .allow-btn:disabled, .deny-btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .error { color: red; margin-bottom: 1rem; }
    </style>
  </head>
  <body>
    <div class="center" id="root">
      <p>Loading authorization request…</p>
    </div>
    <script type="module">
      import { parseOAuthAuthorizeParams, StytchUIClient } from 'https://esm.sh/@stytch/vanilla-js';

      (async () => {
      const stytch = new StytchUIClient('%VITE_STYTCH_PUBLIC_TOKEN%');
      const searchParams = new URLSearchParams(window.location.search);
      const params = parseOAuthAuthorizeParams(searchParams).result;
      const root = document.getElementById('root');

      // Check session first — redirect to login if not authenticated
      const session = stytch.session.getSync();
      if (!session) {
        sessionStorage.setItem('returnTo', window.location.href);
        window.location.href = window.location.origin + '/assets/login.html';
      } else {
        let clientName = null;
        try {
          const res = await stytch.idp.oauthAuthorizeStart({ ...params, response_type: 'code' });
          clientName = res.client_name ?? null;
        } catch {
          root.innerHTML = `
            <div class="center">
              <p class="error">Failed to load authorization details.</p>
              <button onclick="window.location.reload()">Try Again</button>
            </div>`;
          return;
        }

        root.innerHTML = `
          <div class="card">
            <h1>☕ ${clientName ?? 'An app'} wants access</h1>
            <p class="subtext">This will allow <strong>${clientName ?? 'the app'}</strong> to search Paris coffee shops on your behalf using your account.</p>
            <ul>
              <li>☕ Search and browse coffee shops</li>
              <li>⭐ See your personalized favorites</li>
              <li>👤 Read your display name</li>
            </ul>
            <div id="error-msg"></div>
            <div class="button-row">
              <button class="allow-btn" id="allow-btn">Allow</button>
              <button class="deny-btn" id="deny-btn">Deny</button>
            </div>
          </div>`;

        const allowBtn = document.getElementById('allow-btn');
        const denyBtn = document.getElementById('deny-btn');
        const errorMsg = document.getElementById('error-msg');

        async function handleConsent(granted) {
          allowBtn.disabled = true;
          denyBtn.disabled = true;
          if (granted) allowBtn.textContent = 'Authorizing…';
          errorMsg.textContent = '';
          try {
            const res = await stytch.idp.oauthAuthorizeSubmit({
              ...params,
              response_type: 'code',
              consent_granted: granted,
            });
            // Normalize double-? bug: Stytch appends ?code= even when redirect_uri already has query params
            const redirectUri = res.redirect_uri.replace(/\?([^?]*)\?/, '?$1&');
            window.location.href = redirectUri;
          } catch {
            errorMsg.innerHTML = '<p class="error">Something went wrong. Please try again.</p>';
            allowBtn.disabled = false;
            denyBtn.disabled = false;
            allowBtn.textContent = 'Allow';
          }
        }

        allowBtn.addEventListener('click', () => handleConsent(true));
        denyBtn.addEventListener('click', () => handleConsent(false));
      }
      })();
    </script>
  </body>
</html>
