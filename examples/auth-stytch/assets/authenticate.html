<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Completing sign-in…</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    </style>
  </head>
  <body>
    <p>Completing sign-in…</p>
    <script type="module">
      import { StytchUIClient } from 'https://esm.sh/@stytch/vanilla-js';

      const stytch = new StytchUIClient('%VITE_STYTCH_PUBLIC_TOKEN%');
      const token = new URLSearchParams(window.location.search).get('token');

      if (token) {
        try {
          await stytch.oauth.authenticate(token, { session_duration_minutes: 60 });
          const returnTo = sessionStorage.getItem('returnTo');
          if (returnTo) {
            sessionStorage.removeItem('returnTo');
            window.location.href = returnTo;
          } else {
            window.location.href = '/';
          }
        } catch {
          window.location.href = window.location.origin + '/assets/login.html';
        }
      } else {
        window.location.href = window.location.origin + '/assets/login.html';
      }
    </script>
  </body>
</html>
